# --- Deep sleep / power ----------------------------------------------------
CONFIG_ZMK_SLEEP=y
# Go to deep sleep after 15 minutes of inactivity (15 * 60 * 1000)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Idle/Dim after 1 minute of inactivity (1 * 60 * 1000)
CONFIG_ZMK_IDLE_TIMEOUT=60000
# Enables control over the VCC external power pin to cut leakage to unused OLEDs
CONFIG_ZMK_EXT_POWER=y

# --- Bluetooth Power ---------------------------------
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Battery reporting -----------------------------------------------------
CONFIG_ZMK_BATTERY_REPORTING=y
# Report the peripheral (right) half's battery level to the host too.
# Both are required.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
